<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MUV × Impact Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="preconnect" href="https://d8j0ntlcm91z4.cloudfront.net" crossorigin />
<link rel="preconnect" href="https://stream.mux.com" crossorigin />
<link rel="preconnect" href="https://i.ytimg.com" crossorigin />
<link rel="dns-prefetch" href="https://www.youtube.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<script defer src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script defer src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/hls.js@1.5.15/dist/hls.min.js"></script>
<script defer src="app.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000;
    --fg: #fff;
    --card: #0d0d0d;
    --muted-fg: hsl(0 0% 65%);
    --border: hsl(0 0% 20%);
    --hero-subtitle: hsl(210 17% 95%);
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--fg);
    overflow-x: hidden;
    line-height: 1.5;
  }

  .serif { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; }

  .liquid-glass {
    background: rgba(255,255,255,0.01);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
    position: relative;
    overflow: hidden;
  }
  .liquid-glass::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1.4px;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%,
      rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
      rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  .fade-up {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.65s ease, transform 0.65s ease;
  }
  .fade-up.visible { opacity: 1; transform: translateY(0); }

  .delay-1 { transition-delay: 0.1s; }
  .delay-2 { transition-delay: 0.2s; }
  .delay-3 { transition-delay: 0.3s; }
  .delay-4 { transition-delay: 0.4s; }
  .delay-5 { transition-delay: 0.5s; }

  .word-reveal .word {
    display: inline-block;
    margin-right: 0.22em;
    opacity: 0.15;
    transition: opacity 0.35s ease;
  }
  .word-reveal .word.lit { opacity: 1; }

  ::selection { background: rgba(255,255,255,0.15); }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #000; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  input { outline: none; background: transparent; border: none; color: inherit; font-family: inherit; }
  input::placeholder { color: var(--muted-fg); }
  button { cursor: pointer; border: none; font-family: inherit; transition: transform 0.15s ease, opacity 0.15s ease; }
  a { text-decoration: none; color: inherit; }

  .hover-scale { transition: transform 0.18s ease; }
  .hover-scale:hover { transform: scale(1.03); }
  .hover-scale:active { transform: scale(0.97); }

  .section-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted-fg);
    margin-bottom: 16px;
  }

  .divider { border: none; border-top: 1px solid rgba(255,255,255,0.07); }

  /* Pill tag */
  .tag {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted-fg);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 99px;
    padding: 4px 12px;
  }

  /* Stat callout */
  .stat-callout {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .stat-callout .stat-num {
    font-size: clamp(40px, 5vw, 72px);
    font-weight: 700;
    letter-spacing: -2px;
    line-height: 1;
  }
  .stat-callout .stat-label {
    font-size: 13px;
    color: var(--muted-fg);
    text-align: center;
    max-width: 160px;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div id="root"></div>

</body>
</html>

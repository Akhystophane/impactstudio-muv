const { useRef, useEffect, useState } = React;

/* ── Intersection observer for fade-ups ─────────────────────────────────── */
function useFadeUp() {
  useEffect(() => {
    const io = new IntersectionObserver(
      entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
      { rootMargin: '-60px 0px' }
    );
    document.querySelectorAll('.fade-up').forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
}

};

/* ── Approach / Word Reveal ──────────────────────────────────────────────── */
const ApproachSection = () => {
  const sectionRef = useRef(null);
  const vRef = useRef(null);

  const p1words = "Our solution was a dual-track market entry strategy. The institutional track tested whether French municipalities could become credible deployment partners. The community track tested whether a gamified tournament could generate real engagement in a controlled environment.".split(' ');
  const p2words = "Together, these two tracks helped us move beyond theory and understand what sustainable mobility adoption actually requires on the ground.".split(' ');
  const highlighted = new Set(['campus', 'pilot', 'go-to-market', 'municipalities', 'adoption']);

  useEffect(() => {
    vRef.current?.play().catch(() => {});
    const section = sectionRef.current;
    if (!section) return;
    const words = section.querySelectorAll('.word');
    const total = words.length;
    const onScroll = () => {
      const rect = section.getBoundingClientRect();
      const vh = window.innerHeight;
      const progress = Math.max(0, Math.min(1, (vh - rect.top) / (vh + rect.height)));
      words.forEach((w, idx) => {
        const threshold = (idx / total) * 0.85;
        if (progress >= threshold) w.classList.add('lit');
        else w.classList.remove('lit');
      });
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const WordPara = ({ words, size, mt = 0 }) => (
    <p className="word-reveal" style={{ fontSize: size, fontWeight: 500, letterSpacing: '-0.4px', lineHeight: 1.4, marginTop: mt, display: 'flex', flexWrap: 'wrap', justifyContent: 'center', gap: '0 2px' }}>
      {words.map((w, i) => {
        const clean = w.replace(/[^a-z-]/gi, '').toLowerCase();
        return <span key={i} className="word" style={{ color: highlighted.has(clean) ? '#fff' : 'var(--hero-subtitle)' }}>{w}</span>;
      })}
    </p>
  );

  return (
    <section ref={sectionRef} style={{ padding: '0 clamp(24px,5vw,80px) clamp(100px,10vw,160px)', textAlign: 'center' }}>
      <div className="fade-up section-label" style={{ marginBottom: 16 }}>Dual-Track Approach</div>
      <h2 className="fade-up" style={{ fontSize: 'clamp(28px,4vw,52px)', fontWeight: 500, letterSpacing: '-1px', lineHeight: 1.1, marginBottom: 52, textAlign: 'center' }}>
        Two tracks, <span className="serif">one objective</span> <br />move from idea to adoption
      </h2>
      <div className="fade-up delay-1" style={{ marginBottom: 72 }}>
        <video ref={vRef} autoPlay muted loop playsInline
          style={{ width: '100%', maxWidth: 820, borderRadius: 20, display: 'block', margin: '0 auto' }}
          src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260325_132944_a0d124bb-eaa1-4082-aa30-2310efb42b4b.mp4" />
      </div>

      <div style={{ maxWidth: 960, margin: '0 auto' }}>
        <WordPara words={p1words} size="clamp(18px,2.8vw,38px)" />
        <WordPara words={p2words} size="clamp(15px,2vw,26px)" mt={36} />
      </div>
    </section>
  );
};

/* ── Municipality Section ────────────────────────────────────────────────── */
const MunicipalitySection = () => {
  const vRef = useRef(null);

    if (window.Hls && window.Hls.isSupported()) {
      const hls = new window.Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(window.Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.play().catch(() => {});
    }
  }, []);

  const stats = [
    { num: '5', label: 'French cities in active dialogue' },

        style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover', zIndex: 0 }} />

      <div style={{ position: 'relative', zIndex: 10, maxWidth: 1100, margin: '0 auto' }}>
        <div className="fade-up section-label">Municipality Strategy</div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 64, alignItems: 'start', marginBottom: 60 }}>
          <div>
            <h2 className="fade-up" style={{ fontSize: 'clamp(28px,4vw,52px)', fontWeight: 500, letterSpacing: '-1px', lineHeight: 1.1, marginBottom: 20 }}>
              Bringing MUV into the<br /><span className="serif">French municipal landscape</span>

            <p className="fade-up delay-1" style={{ fontSize: 15, color: 'var(--muted-fg)', lineHeight: 1.75, marginBottom: 24 }}>

            </p>
            <p className="fade-up delay-2" style={{ fontSize: 15, color: 'var(--muted-fg)', lineHeight: 1.75 }}>
              The five cities we engaged most actively Perpignan, Bourges, Auxerre, Rennes and Bordeaux each represented a different configuration of mobility maturity, political appetite, and citizen engagement infrastructure.
            </p>
          </div>

          {/* Stats */}
          <div className="fade-up delay-2" style={{ display: 'flex', gap: 0, justifyContent: 'center' }}>
            {stats.map((s, i) => (
              <React.Fragment key={s.label}>
                <div className="stat-callout">
                  <span className="stat-num">{s.num}</span>
                  <span className="stat-label">{s.label}</span>
                </div>
                {i < stats.length - 1 && <div style={{ width: 1, height: 80, background: 'rgba(255,255,255,0.1)', alignSelf: 'center', margin: '0 28px' }} />}
              </React.Fragment>
            ))}
          </div>
        </div>

        {/* Key learning */}
        <div className="fade-up" style={{ background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.08)', borderRadius: 14, padding: '28px 32px', display: 'flex', gap: 24, alignItems: 'flex-start' }}>
          <div style={{ fontSize: 11, letterSpacing: '2px', textTransform: 'uppercase', color: 'var(--muted-fg)', flexShrink: 0, paddingTop: 3 }}>Key learning</div>
          <p style={{ fontSize: 15, lineHeight: 1.7, color: 'var(--hero-subtitle)' }}>
            Municipalities are interested in sustainable mobility but their core question is practical: will citizens actually adopt the solution?
          </p>
        </div>
      </div>
    </section>
  );
};

            <div key={ins.num} className={`fade-up delay-${i+1}`} style={{ background: 'var(--bg)', padding: '40px 32px' }}>
